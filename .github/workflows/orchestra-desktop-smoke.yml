name: orchestra-desktop-smoke

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  desktop-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Run desktop release gate
        run: npm run release:gate

      - name: Upload parity report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestra-desktop-parity-report
          path: apps/desktop/reports
