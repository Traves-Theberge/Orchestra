name: orchestra-desktop-smoke

on:
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'apps/backend/**'
      - '.github/workflows/orchestra-desktop-smoke.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
      - 'apps/backend/**'
      - '.github/workflows/orchestra-desktop-smoke.yml'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/backend/go.mod
          cache-dependency-path: apps/backend/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Run desktop release gate
        run: npm run release:gate

      - name: Upload parity report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: orchestra-desktop-parity-report
          path: apps/desktop/reports
